# This workflow will upload a Python Package using uv when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

name: Upload Python Package

on:
  release:
    types: [published]

jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/normi
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing

    steps:
    - uses: actions/checkout@v7
    - uses: astral-sh/setup-uv@v7
    - name: Build package
      run: |
        uv build
    - name: Run test (wheel)
      run: |
        uv run --isolated --no-project -p 3.13 --with dist/*.whl tests/pypi_test.py
    - name: Run test (source distribution)
      run: |
        uv run --isolated --no-project -p 3.13 --with dist/*.tar.gz tests/pypi_test.py
    - run: uv publish --trusted-publishing always
